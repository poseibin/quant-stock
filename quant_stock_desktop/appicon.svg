    <radialGradient id="glow" cx="0.3" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#ffb000" stop-opacity="0.32"/>
      <stop offset="0.55" stop-color="#ffb000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#glow)"/>
  <rect x="2" y="2" width="1020" height="1020" rx="231" ry="231" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

  <g>
    <line x1="220" y1="430" x2="220" y2="700" stroke="#26c281" stroke-width="6"/>
    <rect x="190" y="500" width="60" height="160" fill="url(#down)" rx="6"/>

    <line x1="350" y1="350" x2="350" y2="640" stroke="#ef5350" stroke-width="6"/>
